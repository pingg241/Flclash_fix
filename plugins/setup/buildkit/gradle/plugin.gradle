// plugin.gradle — Build Go core as part of the Android Gradle build
//
// Apply this from the setup plugin's android/build.gradle:
//   apply from: "${project.projectDir}/../buildkit/gradle/plugin.gradle"
//
// It adds a task that runs build_tool android before mergeNativeLibs.

def buildkitDir = file("${project.projectDir}/../buildkit").absolutePath
def projectRoot = file("${buildkitDir}/../../..").absolutePath
def androidArch = System.getenv('ANDROID_ARCH')
def targetPlatform = project.findProperty('target-platform') ?:
        rootProject.findProperty('target-platform')
def archArgs = androidArch
        ? ['--arch', androidArch]
        : (targetPlatform ? ['--target-platform', targetPlatform.toString()] : [])

def normalizeFlutterRoot = { String rawPath ->
    def value = rawPath?.trim()
    if (value == null || value.isEmpty()) return null
    if (System.getProperty('os.name').toLowerCase().contains('windows')) {
        value = value.replace('/', '\\')
    }
    def sdk = rootProject.file(value).absoluteFile
    def dart = new File(sdk, System.getProperty('os.name').toLowerCase().contains('windows')
            ? 'bin\\cache\\dart-sdk\\bin\\dart.exe'
            : 'bin/cache/dart-sdk/bin/dart')
    if (!sdk.isDirectory() || !dart.isFile()) return null
    return sdk.absolutePath
}

def resolveFlutterRoot = {
    def explicit = System.getenv('FLUTTER_ROOT')
    if (explicit != null && !explicit.trim().isEmpty()) {
        def resolved = normalizeFlutterRoot(explicit)
        if (resolved == null) {
            throw new GradleException("FLUTTER_ROOT does not point to a valid Flutter SDK: ${explicit}")
        }
        return resolved
    }

    def localProperties = rootProject.file('local.properties')
    def flutterSdk = null
    if (localProperties.isFile()) {
        def properties = new Properties()
        localProperties.withInputStream { properties.load(it) }
        flutterSdk = properties.getProperty('flutter.sdk')
    }
    def resolved = normalizeFlutterRoot(flutterSdk)
    if (resolved == null) {
        throw new GradleException(
                'Flutter SDK not found. Set FLUTTER_ROOT or flutter.sdk in android/local.properties.'
        )
    }
    return resolved
}

def flutterRoot = resolveFlutterRoot()

// Resolve NDK path for Go CGO. Prefer explicit env, then SDK ndk/<version>.
def resolveAndroidNdk = {
    def fromEnv = System.getenv('ANDROID_NDK')
    if (fromEnv != null && !fromEnv.trim().isEmpty() && file(fromEnv).exists()) {
        return fromEnv
    }
    def fromHome = System.getenv('ANDROID_NDK_HOME')
    if (fromHome != null && !fromHome.trim().isEmpty() && file(fromHome).exists()) {
        return fromHome
    }

    def sdkDir = null
    def localProps = rootProject.file('local.properties')
    if (localProps.exists()) {
        def props = new Properties()
        localProps.withInputStream { props.load(it) }
        sdkDir = props.getProperty('sdk.dir')
    }
    if (sdkDir == null || sdkDir.trim().isEmpty()) {
        sdkDir = System.getenv('ANDROID_HOME') ?: System.getenv('ANDROID_SDK_ROOT')
    }

    def preferredVersion = null
    try {
        // android/gradle/libs.versions.toml → ndkVersion
        preferredVersion = rootProject.extensions
                .findByName('libs')
                ?.versions
                ?.ndkVersion
                ?.get()
    } catch (Throwable ignored) {
        // libs catalog may not be available on all modules
    }
    if (preferredVersion == null) {
        preferredVersion = '28.2.13676358'
    }

    if (sdkDir != null && !sdkDir.trim().isEmpty()) {
        def preferred = file("${sdkDir}/ndk/${preferredVersion}")
        if (preferred.exists()) {
            return preferred.absolutePath
        }
        def ndkRoot = file("${sdkDir}/ndk")
        if (ndkRoot.exists()) {
            def versions = ndkRoot.listFiles()?.findAll { it.isDirectory() }?.sort { a, b ->
                b.name <=> a.name
            }
            if (versions != null && !versions.isEmpty()) {
                return versions[0].absolutePath
            }
        }
        def bundle = file("${sdkDir}/ndk-bundle")
        if (bundle.exists()) {
            return bundle.absolutePath
        }
    }
    return null
}

def androidNdk = resolveAndroidNdk()

def requestedAbis = {
    if (androidArch != null) {
        switch (androidArch) {
            case 'arm': return ['armeabi-v7a']
            case 'arm64': return ['arm64-v8a']
            case 'amd64': return ['x86_64']
            default: throw new GradleException("Invalid ANDROID_ARCH: ${androidArch}")
        }
    }
    if (targetPlatform != null) {
        def result = targetPlatform.toString().split(',').collect { platform ->
            switch (platform.trim()) {
                case 'android-arm': return 'armeabi-v7a'
                case 'android-arm64': return 'arm64-v8a'
                case 'android-x64': return 'x86_64'
                default: throw new GradleException("Invalid target-platform: ${platform}")
            }
        }.unique()
        if (result.isEmpty()) throw new GradleException('No Android target platforms provided')
        return result
    }
    return ['armeabi-v7a', 'arm64-v8a', 'x86_64']
}()

def cmakeArtifactsForAbi = { abi ->
    [
            file("${projectRoot}/android/core/src/main/jniLibs/${abi}/libclash.so"),
            file("${projectRoot}/android/core/src/main/cpp/includes/${abi}/libclash.h"),
            file("${projectRoot}/android/core/src/main/cpp/includes/${abi}/bride.h"),
    ]
}
def cmakeStampForAbi = { abi ->
    file("${projectRoot}/android/core/src/main/cpp/includes/${abi}/.libclash.stamp")
}
def cmakeInputsForAbi = { abi ->
    [*cmakeArtifactsForAbi(abi), cmakeStampForAbi(abi)]
}
def requestedCmakeInputs = files(requestedAbis.collectMany(cmakeInputsForAbi))
def verifyCmakeArtifacts = { Collection<String> abis ->
    def missing = abis.collectMany(cmakeArtifactsForAbi).findAll { !it.isFile() }
    if (!missing.isEmpty()) {
        def paths = missing.collect { it.absolutePath }.join(System.lineSeparator())
        throw new GradleException(
                "Go core build did not produce all required Android artifacts:" +
                        System.lineSeparator() + paths
        )
    }
}

// Keep Gradle's up-to-date checks aligned with the build tool's real inputs.
// A stale ABI library must never satisfy a build for another ABI or source revision.
def coreInputs = fileTree(dir: projectRoot, includes: [
        'core/**/*.go',
        'core/**/*.s',
        'core/**/*.c',
        'core/**/*.h',
        'core/**/*.crt',
        'core/**/*.mod',
        'core/**/*.sum',
        'build_config.yaml',
        'plugins/setup/buildkit/build_tool/**/*.dart',
        'plugins/setup/buildkit/build_tool/pubspec.*',
        'plugins/setup/buildkit/build_tool/build_config.yaml',
        'plugins/setup/buildkit/run_build_tool.sh',
        'plugins/setup/buildkit/run_build_tool.cmd',
], excludes: [
        '**/.dart_tool/**',
        '**/build/**',
        '**/target/**',
        '**/test/**',
        '**/*_test.go',
])

// Windows Git bash loses backslashes when paths are passed poorly; use .cmd on Windows.
def isWindows = System.getProperty('os.name').toLowerCase().contains('windows')
def launcher = isWindows
        ? "${buildkitDir}\\run_build_tool.cmd"
        : "${buildkitDir}/run_build_tool.sh"

task buildGoCore(type: Exec) {
    // run_build_tool.cmd uses %CD% as project root — must start from repo root.
    workingDir projectRoot
    if (isWindows) {
        commandLine 'cmd', '/c', launcher, 'android', *archArgs
    } else {
        commandLine 'bash', launcher, 'android', *archArgs
    }

    def forceGo = (project.findProperty('forceGoCore') == 'true') ||
            (System.getenv('FORCE_GO_CORE') == '1')
    if (forceGo) {
        outputs.upToDateWhen { false }
    }
    inputs.files(coreInputs)
    inputs.property('androidArch', androidArch ?: '')
    inputs.property('targetPlatform', targetPlatform ?: '')
    inputs.property('ndkPath', androidNdk ?: '')
    inputs.property('flutterRoot', flutterRoot)
    inputs.property('appEnv', project.hasProperty('appEnv') ? project.appEnv : 'pre')
    outputs.files(requestedAbis.collect { abi ->
        file("${projectRoot}/android/core/src/main/jniLibs/${abi}/libclash.so")
    })
    outputs.dirs(requestedAbis.collectMany { abi ->
        [
                file("${projectRoot}/libclash/android/includes/${abi}"),
                file("${projectRoot}/android/core/src/main/cpp/includes/${abi}"),
        ]
    })

    doLast {
        verifyCmakeArtifacts(requestedAbis)
        requestedAbis.each { abi ->
            cmakeStampForAbi(abi).setText(
                    "${System.currentTimeMillis()}${System.lineSeparator()}",
                    'UTF-8'
            )
        }
    }

    if (androidNdk == null) {
        doFirst {
            throw new GradleException(
                    'Android NDK not found. Set ANDROID_NDK or ANDROID_NDK_HOME, ' +
                            'or install NDK under sdk.dir/ndk/.'
            )
        }
    } else {
        environment 'ANDROID_NDK', androidNdk
        environment 'ANDROID_NDK_HOME', androidNdk
    }
    environment 'APP_ENV', project.hasProperty('appEnv') ? project.appEnv : 'pre'
    environment 'PROJECT_DIR', projectRoot
    // Flutter / Dart for build_tool.cmd on Windows. Always inject the
    // validated SDK path, including when the caller only has local.properties.
    environment 'FLUTTER_ROOT', flutterRoot
    if (System.getenv('GOPROXY') != null) {
        environment 'GOPROXY', System.getenv('GOPROXY')
    }
}

def goCoreTask = buildGoCore

// Wire into the Android build across all subprojects
afterEvaluate {
    rootProject.subprojects { sub ->
        sub.tasks.matching {
            it.name.startsWith('configureCMake') ||
                    it.name.startsWith('buildCMake') ||
                    it.name.startsWith('externalNativeBuild') ||
                    (it.name.startsWith('merge') &&
                            (it.name.endsWith('JniLibFolders') ||
                                    it.name.endsWith('NativeLibs')))
        }.configureEach { nativeTask ->
            dependsOn goCoreTask

            if (sub.path == ':core' &&
                    (nativeTask.name.startsWith('configureCMake') ||
                            nativeTask.name.startsWith('buildCMake'))) {
                def abiMatcher = nativeTask.name =~ /\[([^]]+)]$/
                def taskAbi = abiMatcher.find() ? abiMatcher.group(1) : null
                if (taskAbi == null || requestedAbis.contains(taskAbi)) {
                    def taskArtifacts = taskAbi == null
                            ? requestedCmakeInputs
                            : files(cmakeInputsForAbi(taskAbi))
                    inputs.files(taskArtifacts)
                            .withPropertyName('goCoreArtifacts')
                            .withPathSensitivity(PathSensitivity.RELATIVE)
                    inputs.property('goCoreAbi', taskAbi ?: requestedAbis.join(','))
                    doFirst {
                        verifyCmakeArtifacts(taskAbi == null ? requestedAbis : [taskAbi])
                    }
                }
            }
        }
    }
}
