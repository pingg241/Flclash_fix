name: Build Linux

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.4'
  GO_VERSION: '1.26.4'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: amd64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            core/go.sum
            core/Clash.Meta/go.sum
            core/Clash.Meta/third_party/smux/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            plugins/rust_api/rust -> target

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --reporter expanded

      - name: Build Linux packages
        shell: bash
        run: |
          args=(linux --arch "${{ matrix.arch }}" -v)
          if [[ "${GITHUB_REF}" == refs/tags/v* && "${GITHUB_REF_NAME}" != *-* ]]; then
            args+=(--env stable)
          fi
          dart setup.dart "${args[@]}"

      - name: Verify build artifacts
        shell: bash
        run: test -d dist && find dist -type f -print -quit | grep -q .

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flclash-linux-${{ matrix.arch }}
          path: dist/**
          if-no-files-found: error
          retention-days: 14
