name: Build Android

on:
  workflow_call:
    inputs:
      app_env:
        description: Application environment (pre or stable)
        required: false
        type: string
        default: pre
      source_ref:
        description: Git ref to build
        required: false
        type: string
        default: ''
    secrets:
      KEYSTORE:
        required: false
      KEY_ALIAS:
        required: false
      STORE_PASSWORD:
        required: false
      KEY_PASSWORD:
        required: false
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.4'
  GO_VERSION: '1.26.4'
  NDK_VERSION: 'r28c'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      ANDROID_KEYSTORE: ${{ secrets.KEYSTORE }}
      ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      ANDROID_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref || github.ref }}
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            core/go.sum
            core/Clash.Meta/go.sum
            core/Clash.Meta/third_party/smux/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            plugins/rust_api/rust -> target

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true
          link-to-sdk: true

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --reporter expanded

      - name: Configure Android signing
        run: |
          if [ -n "$ANDROID_KEYSTORE" ]; then
            printf '%s' "$ANDROID_KEYSTORE" | base64 --decode > android/app/keystore.jks
            key_alias="$ANDROID_KEY_ALIAS"
            store_password="$ANDROID_STORE_PASSWORD"
            key_password="$ANDROID_KEY_PASSWORD"
          else
            base64 --decode .github/android-public-keystore.base64 > android/app/keystore.jks
            key_alias='flclash-public'
            store_password='flclash-public'
            key_password='flclash-public'
            echo 'Using the repository public Android release key.'
          fi
          {
            echo "keyAlias=$key_alias"
            echo "storePassword=$store_password"
            echo "keyPassword=$key_password"
          } >> android/local.properties

      - name: Build Android packages
        shell: bash
        env:
          APP_ENV: ${{ inputs.app_env || 'pre' }}
        run: |
          if [[ "$APP_ENV" != pre && "$APP_ENV" != stable ]]; then
            echo "Unsupported application environment: $APP_ENV" >&2
            exit 1
          fi
          args=(android -v --env "$APP_ENV")
          dart setup.dart "${args[@]}"

      - name: Verify build artifacts
        shell: bash
        run: test -d dist && find dist -type f -print -quit | grep -q .

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flclash-android
          path: dist/**
          if-no-files-found: error
          retention-days: 14
