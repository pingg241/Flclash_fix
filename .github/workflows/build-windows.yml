name: Build Windows

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.4'
  GO_VERSION: '1.26.4'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            arch: amd64
          - runner: windows-11-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - name: Enable Git long paths
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            core/go.sum
            core/Clash.Meta/go.sum
            core/Clash.Meta/third_party/smux/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/helper -> target
            plugins/rust_api/rust -> target

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test --reporter expanded

      - name: Build Windows packages
        shell: pwsh
        run: |
          $arguments = @('setup.dart', 'windows', '--arch', '${{ matrix.arch }}', '-v')
          if ($env:GITHUB_REF -like 'refs/tags/v*' -and $env:GITHUB_REF_NAME -notlike '*-*') {
            $arguments += @('--env', 'stable')
          }
          & dart @arguments
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify build artifacts
        shell: pwsh
        run: |
          $files = Get-ChildItem dist -File -Recurse -ErrorAction SilentlyContinue
          if (-not $files) { throw 'No Windows artifacts were produced.' }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flclash-windows-${{ matrix.arch }}
          path: dist/**
          if-no-files-found: error
          retention-days: 14
