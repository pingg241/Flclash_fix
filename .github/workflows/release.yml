name: Build And Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' && github.ref_type == 'branch' }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      source_ref: ${{ steps.metadata.outputs.source_ref }}
      app_env: ${{ steps.metadata.outputs.app_env }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
    steps:
      - name: Resolve release metadata
        id: metadata
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_TAG: ${{ inputs.tag }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            release_tag="$INPUT_TAG"
            source_ref="$INPUT_TAG"
          elif [[ "$REF_TYPE" == "tag" ]]; then
            release_tag="$REF_NAME"
            source_ref="$REF_NAME"
          else
            release_tag="main-$RUN_NUMBER"
            source_ref="$COMMIT_SHA"
          fi

          if [[ -z "$release_tag" ]]; then
            echo 'Release tag cannot be empty.' >&2
            exit 1
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" && ! "$release_tag" =~ ^v[0-9] ]]; then
            echo "Manual releases must use an existing v* tag: $release_tag" >&2
            exit 1
          fi

          if [[ "$release_tag" == *-* ]]; then
            app_env='pre'
            prerelease='true'
          else
            app_env='stable'
            prerelease='false'
          fi

          {
            echo "release_tag=$release_tag"
            echo "source_ref=$source_ref"
            echo "app_env=$app_env"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

  android:
    needs: prepare
    uses: ./.github/workflows/build-android.yml
    with:
      app_env: ${{ needs.prepare.outputs.app_env }}
      source_ref: ${{ needs.prepare.outputs.source_ref }}
    secrets: inherit

  windows:
    needs: prepare
    uses: ./.github/workflows/build-windows.yml
    with:
      app_env: ${{ needs.prepare.outputs.app_env }}
      source_ref: ${{ needs.prepare.outputs.source_ref }}

  linux:
    needs: prepare
    uses: ./.github/workflows/build-linux.yml
    with:
      app_env: ${{ needs.prepare.outputs.app_env }}
      source_ref: ${{ needs.prepare.outputs.source_ref }}

  macos:
    needs: prepare
    uses: ./.github/workflows/build-macos.yml
    with:
      app_env: ${{ needs.prepare.outputs.app_env }}
      source_ref: ${{ needs.prepare.outputs.source_ref }}

  release:
    needs:
      - prepare
      - android
      - windows
      - linux
      - macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flclash-*
          path: release
          merge-multiple: true

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release
          find . -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ needs.prepare.outputs.source_ref }}
          name: FlClash ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          fail_on_unmatched_files: true
          files: release/**
